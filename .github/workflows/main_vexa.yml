name: Build and deploy ASP.Net Core app to Azure Web App - VEXA

on:
  push:
    branches:
      - HERE-WE-WORK
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore CVAPI.csproj

      - name: Build
        run: dotnet build CVAPI.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CVAPI.csproj --configuration Release --output ./publish --no-restore

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./deploy-folder

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D4882CCE5C994349A8DD2643128A532C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0979B02883D6401CB9A51EDC751D2ED3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C2AB075470DC47C1B812744CBF9827AB }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'VEXA'
          slot-name: 'Production'
          package: ./deploy-folder
